    <script type="text/javascript">

        $(function(){
            new Vue({
                el:'#there',
                data:{
                    name:'ok',
                },
                mounted:function(){

                },
                methods:{
                    hello:function(){
                        weui.alert('hello world');
                    },
                    actionSheet:function(){
                        weui.actionSheet([
                            {
                                label: '拍照',
                                onClick: function () {
                                    console.log('拍照');
                                }
                            }, {
                                label: '从相册选择',
                                onClick: function () {
                                    console.log('从相册选择');
                                }
                            }, {
                                label: '其他',
                                onClick: function () {
                                    console.log('其他');
                                }
                            }
                        ], [
                            {
                                label: '取消',
                                onClick: function () {
                                    console.log('取消');
                                }
                            }
                        ], {
                            className: 'custom-classname'
                        });
                    },
                    openDialog:function(){
                        if(!this.dialog){
                            this.dialog = weui.dialog({
                                title: 'dialog标题',
                                content: 'dialog内容',
                                className: 'custom-classname',
                                buttons: [{
                                    label: '取消',
                                    type: 'default',
                                    onClick: function () { alert('取消') }
                                }, {
                                    label: '确定',
                                    type: 'primary',
                                    onClick: function () { alert('确定') }
                                }]
                            })
                        }else{
                            this.dialog.show()
                        }
                    },
                    loading:function(){
                        var loading = weui.loading('loading', {
                            className: 'custom-classname'
                        });
                        setTimeout(function () {
                            loading.hide(function() {
                                console.log('`loading` has been hidden');
                            });
                        }, 3000);
                    },
                    pick1:function(){
                        // 单列picker
                        weui.picker([
                            {
                                label: '飞机票',
                                value: 0,
                                disabled: true // 不可用
                            },
                            {
                                label: '火车票',
                                value: 1
                            },
                            {
                                label: '汽车票',
                                value: 3
                            },
                            {
                                label: '公车票',
                                value: 4,
                            }
                        ], {
                            className: 'custom-classname',
                            defaultValue: [3],
                            onChange: function (result) {
                                console.log(result)
                            },
                            onConfirm: function (result) {
                                console.log(result)
                            },
                            id: 'singleLinePicker'
                        });
                    },
                    datapick1:function(){
                        // 示例1：
                        weui.datePicker({
                            start: 1990,
                            end: 2030,
                            defaultValue: new Date(),
                            onChange: function(result){
                                console.log(result);
                            },
                            onConfirm: function(result){
                                console.log(result);
                            },
                            id: 'datePicker'
                        });
                    },
                    tooltip:function(){
                        weui.topTips('请填写正确的字段', 3000);
                        weui.topTips('sssssss字段', 3000);
                        weui.topTips('bbbbbbbb确的字段', 3000);
                    }
                }
            })
        })

    </script>

<div id="there">
    <a href="#" @click="hello()" class="weui-btn weui-btn_primary">按钮</a>
    <a href="#" @click="actionSheet()" class="weui-btn weui-btn_primary">actionSheet</a>
    <a href="#" @click="openDialog()" class="weui-btn weui-btn_primary">openDialog</a>
    <a href="#" @click="loading()" class="weui-btn weui-btn_primary">loading</a>
    <a href="#" @click="pick1()" class="weui-btn weui-btn_primary">loading</a>
    <a href="#" @click="datapick1()" class="weui-btn weui-btn_primary">datapick1</a>
    <a href="#" @click="tooltip()" class="weui-btn weui-btn_primary">tooltip</a>
