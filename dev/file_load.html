<script type="text/javascript">
(function addXhrProgressEvent($) {
    var originalXhr = $.ajaxSettings.xhr;
    $.ajaxSetup({
        progress: function() { console.log("standard progress callback"); },
        xhr: function() {
            var req = originalXhr(), that = this;
            if (req) {
                if (typeof req.addEventListener == "function") {
                    req.addEventListener("progress", function(evt) {
                        that.progress(evt);
                    },false);
                }
            }
            return req;
        }
    });
})(jQuery);

Vue.component('file-input',{
    template:"<input type='file' @change='_changed'>",
    props:{
        ready:{}
    },
    methods:{
        _changed:function (changeEvent) {
            var file=changeEvent.target.files[0];
            if(!file)
                return
            this.file=file
            this.fd = new FormData();
            this.fd.append('file', file);
            this.ready=true;
        },
        read:function (callback) {
        	var reader = new FileReader();
        	reader.onloadend = function () {
		        // 图片的 base64 格式, 可以直接当成 img 的 src 属性值
		        var dataURL = reader.result;
		        //var img = new Image();
		        //img.src = dataURL;
		        // 插入到 DOM 中预览
		        //$('#haha')[0].src=dataURL
		        callback(dataURL) 
		    };

		    reader.readAsDataURL(this.file); // 读出 base64
        },
        upload:function (up_url) {
            var self =this;
            $.ajax({
                url:up_url,
                type:'post',
                data:this.fd,
                contentType: false,
                cache: false,
                success:function (data) {
                    self.$dispatch('response',data)
                    
                },
                //error:function (data) {
                //	alert(data.responseText)
                //},
                processData:false,
	      //      progress: function(evt) {
			    //    if (evt.lengthComputable) {
				   //     //self.$dispatch('progress',parseInt( (evt.loaded / evt.total * 100), 10))
			    //        console.log("Loaded " + parseInt( (evt.loaded / evt.total * 100), 10) + "%");
			    //    }
			    //    else {
			    //        console.log("Length not computable.");
			    //    }
		    	//}
		    	   xhrFields: {
				        onprogress: function (e) {
				            if (e.lengthComputable) {
				                console.log('Loaded '+ (e.loaded / e.total * 100) + '%');
				            } else {
				                console.log('Length not computable.');
				            }
				        }
				    }
            })
        },
       
    	}
	})
        </script>
