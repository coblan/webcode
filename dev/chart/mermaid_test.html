    <link href="https://cdn.bootcss.com/mermaid/7.0.0/mermaid.min.css" rel="stylesheet">
    <script src="https://cdn.bootcss.com/mermaid/7.0.0/mermaid.min.js"></script>


    <script type="text/javascript">
        Vue.config.devtools = true
        var bus=new Vue()
        $(function(){
            mermaid.init({noteMargin: 10}, ".mermaid");

            $('.node').bind('click',function(e){
                $(this).attr('class','node active')
            })
        })
        function callback(e){
            alert(e)
        }
    </script>
</head>
<body >

<div class="mermaid">
    graph LR
    A-->B
    B-->C
    C-->A
    D-->C

    click A callback "Tooltip for a callback"
</div>

<div class="mermaid">
    %% Subgraph example
    graph TB
    subgraph one
    a1-->a2
    end
    subgraph two
    b1-->b2
    end
    subgraph three
    c1-->c2
    end
    c1-->a2
</div>

</body>

<style>
    .node{
        cursor: pointer;
    }
    .node.active rect{
        fill: darkseagreen;
    }
</style>
