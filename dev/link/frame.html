<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
        <title>Deposits and Withdrawals</title>
        <script type="text/javascript" src='http://apps.bdimg.com/libs/jquery/1.9.1/jquery.min.js'></script>
        <script src="http://cdn.bootcss.com/vue/1.0.24/vue.js"></script>
		<script src="http://cdn.bootcss.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
		<link rel="stylesheet" href="http://cdn.bootcss.com/bootstrap/3.3.5/css/bootstrap.min.css">


	<script type="text/javascript">
		function load(url,callback,css) {
			if(!window.__load_frame){
				$('body').append('<div id="_load_frame_wrap"><div class="imiddle popframe"><iframe id="_load_frame" frameborder="0" width="100%" height="100%"></iframe></div></div>')
				window.__load_frame=true
			}
			$('#_load_frame').attr('src',url)
			if(!callback){
				window.__fram_back=null
			}else{
				window.__fram_back=function (v) {
				callback(v)
				unload()
			} 
			}
		
			if(css){
				$('.popframe').css(css)
			}
			$('#_load_frame_wrap').show()
		}
		
		function unload(){
			//$('#_load_frame').attr('src','')
			$('#_load_frame_wrap').hide()
		}

		$(function () {
			load('sub_page.html',function (v) {
				alert(v)
			},{'width':'80vw'})
		})
	</script>


	</head>
    <body>
	    <span>sss</span>
		
    </body>

    <style type='text/css'>
		#_load_frame_wrap{
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			display:none;
			z-index: 1000;
			background: rgba(88, 88, 88, 0.2);
		}
		.imiddle{
		    position: absolute;
	        top: 50%;
	        left: 50%;
	        transform: translate(-50%, -50%);
	        -ms-transform:translate(-50%, -50%); 	/* IE 9 */
			-moz-transform:translate(-50%, -50%); 	/* Firefox */
			-webkit-transform:translate(-50%, -50%); /* Safari 和 Chrome */
			-o-transform:translate(-50%, -50%); 
			
	        text-align: center;
			/*display: table;*/
	        z-index: 10000;
    	}
    	.popframe{
	    	width:500px;
	    	height:400px;
    	}
		</style>
</html>
